<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="四个 skill 的协作流水线：写代码 → 审查 → 提交 → 记录">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6f8ff"/><stop offset="1" stop-color="#eaeffb"/>
    </linearGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8ec5ff"/><stop offset="1" stop-color="#6ea8fe"/></linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#9ee6c4"/><stop offset="1" stop-color="#46d1c4"/></linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd17a"/><stop offset="1" stop-color="#ffb454"/></linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c5a3ff"/><stop offset="1" stop-color="#9d7bff"/></linearGradient>
    <filter id="ws" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#2a3458" flood-opacity="0.22"/></filter>
  </defs>
  <rect width="1200" height="300" fill="url(#wbg)"/>

  <!-- 连线 -->
  <g stroke-linecap="round" fill="none">
    <path d="M250 150 H320" stroke="#9aa7c8" stroke-width="4"/>
    <path d="M560 150 H630" stroke="#9aa7c8" stroke-width="4"/>
    <path d="M870 150 H940" stroke="#9aa7c8" stroke-width="4"/>
    <path d="M305 138 l18 12 l-18 12" stroke="#9aa7c8" stroke-width="4"/>
    <path d="M615 138 l18 12 l-18 12" stroke="#9aa7c8" stroke-width="4"/>
    <path d="M925 138 l18 12 l-18 12" stroke="#9aa7c8" stroke-width="4"/>
  </g>

  <!-- code-comment -->
  <g filter="url(#ws)" transform="translate(40 95)">
    <rect width="210" height="110" rx="20" fill="url(#c1)"/>
    <rect width="210" height="110" rx="20" fill="#ffffff" opacity="0.14"/>
    <text x="105" y="46" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="22" font-weight="700" fill="#fff">code-comment</text>
    <text x="105" y="76" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="15" fill="#eef4ff">写注释</text>
  </g>
  <!-- code-review -->
  <g filter="url(#ws)" transform="translate(350 95)">
    <rect width="210" height="110" rx="20" fill="url(#c2)"/>
    <rect width="210" height="110" rx="20" fill="#ffffff" opacity="0.14"/>
    <text x="105" y="46" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="22" font-weight="700" fill="#0f4a38">code-review</text>
    <text x="105" y="76" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="15" fill="#0f4a38">提交前审查</text>
  </g>
  <!-- git-commit -->
  <g filter="url(#ws)" transform="translate(660 95)">
    <rect width="210" height="110" rx="20" fill="url(#c3)"/>
    <rect width="210" height="110" rx="20" fill="#ffffff" opacity="0.14"/>
    <text x="105" y="46" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="22" font-weight="700" fill="#6b4708">git-commit</text>
    <text x="105" y="76" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="15" fill="#6b4708">规范提交</text>
  </g>
  <!-- ai-log -->
  <g filter="url(#ws)" transform="translate(970 95)">
    <rect width="210" height="110" rx="20" fill="url(#c4)"/>
    <rect width="210" height="110" rx="20" fill="#ffffff" opacity="0.14"/>
    <text x="105" y="46" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="22" font-weight="700" fill="#fff">ai-log</text>
    <text x="105" y="76" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="15" fill="#f1ebff">记录日志</text>
  </g>

  <!-- 顶部阶段标签 -->
  <text x="145" y="60" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#7d8cb0">① 写</text>
  <text x="455" y="60" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#7d8cb0">② 审查</text>
  <text x="765" y="60" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#7d8cb0">③ 提交</text>
  <text x="1075" y="60" text-anchor="middle" font-family="-apple-system,'PingFang SC',sans-serif" font-size="14" fill="#7d8cb0">④ 记录</text>
</svg>
