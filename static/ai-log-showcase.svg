<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ai-log 可视化时间线与玻璃详情卡片，含 LaTeX/mermaid/编辑功能">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11162a"/><stop offset="1" stop-color="#1a2238"/>
    </linearGradient>
    <radialGradient id="lg1" cx="0.15" cy="0.1" r="0.8"><stop offset="0" stop-color="#6e8cdc" stop-opacity="0.35"/><stop offset="1" stop-color="#6e8cdc" stop-opacity="0"/></radialGradient>
    <radialGradient id="lg2" cx="0.9" cy="1" r="0.8"><stop offset="0" stop-color="#b478dc" stop-opacity="0.3"/><stop offset="1" stop-color="#b478dc" stop-opacity="0"/></radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#26324e" stop-opacity="0.92"/><stop offset="1" stop-color="#1a2238" stop-opacity="0.88"/></linearGradient>
    <filter id="ls" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="1200" height="340" fill="url(#lbg)"/>
  <rect width="1200" height="340" fill="url(#lg1)"/>
  <rect width="1200" height="340" fill="url(#lg2)"/>

  <!-- 左侧时间线泳道 -->
  <g transform="translate(80 40)">
    <!-- 两条会话竖线 -->
    <line x1="30" y1="20" x2="30" y2="250" stroke="#6ea8fe" stroke-width="5" opacity="0.5" stroke-linecap="round"/>
    <line x1="90" y1="60" x2="90" y2="210" stroke="#9d7bff" stroke-width="5" opacity="0.5" stroke-linecap="round"/>
    <!-- 节点 -->
    <g>
      <circle cx="30" cy="40"  r="17" fill="#6ea8fe"/><text x="30" y="46" text-anchor="middle" font-size="14">🦊</text>
      <circle cx="30" cy="120" r="17" fill="#6ea8fe"/><text x="30" y="126" text-anchor="middle" font-size="14">🦊</text>
      <circle cx="30" cy="230" r="17" fill="#6ea8fe"/><text x="30" y="236" text-anchor="middle" font-size="14">🦊</text>
      <circle cx="90" cy="80"  r="17" fill="#9d7bff"/><text x="90" y="86" text-anchor="middle" font-size="14">🦋</text>
      <circle cx="90" cy="190" r="17" fill="#9d7bff"/><text x="90" y="196" text-anchor="middle" font-size="14">🦋</text>
    </g>
    <!-- 选中节点高亮 + 连接线到详情 -->
    <circle cx="30" cy="120" r="23" fill="none" stroke="#6ea8fe" stroke-width="3" opacity="0.6"/>
    <path d="M53 120 C 130 120, 150 90, 215 90" stroke="#6ea8fe" stroke-width="2.5" stroke-dasharray="5 4" fill="none" opacity="0.6"/>
  </g>

  <!-- 右侧详情玻璃卡片 -->
  <g filter="url(#ls)" transform="translate(290 70)">
    <rect width="560" height="220" rx="20" fill="url(#card)"/>
    <rect width="560" height="92" rx="20" fill="#ffffff" opacity="0.05"/>
    <!-- 标题 -->
    <text x="28" y="48" font-family="-apple-system,'PingFang SC',sans-serif" font-size="22" font-weight="700" fill="#f5f7fc">重构专项 · 模块化拆分</text>
    <!-- 操作按钮 -->
    <g transform="translate(420 24)">
      <rect width="58" height="30" rx="9" fill="#ffffff" opacity="0.1"/><text x="29" y="20" text-anchor="middle" font-size="13" fill="#cdd6ee">✏️ 编辑</text>
      <rect x="66" width="58" height="30" rx="9" fill="#ff7a6e" opacity="0.25"/><text x="95" y="20" text-anchor="middle" font-size="13" fill="#ffc4bd">🗑️ 删除</text>
    </g>
    <!-- 正文行 -->
    <rect x="28" y="78" width="380" height="9" rx="4.5" fill="#8ea0c8" opacity="0.8"/>
    <rect x="28" y="98" width="300" height="9" rx="4.5" fill="#6ea8fe" opacity="0.7"/>
    <!-- LaTeX 公式块 -->
    <rect x="28" y="124" width="220" height="40" rx="9" fill="#ffffff" opacity="0.06"/>
    <text x="138" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="19" font-style="italic" fill="#9ee6c4">E = mc²  ∑ xᵢ</text>
    <!-- mermaid 小图示意 -->
    <g transform="translate(270 122)">
      <rect width="262" height="74" rx="9" fill="#ffffff" opacity="0.06"/>
      <rect x="16" y="18" width="50" height="24" rx="6" fill="#6ea8fe" opacity="0.7"/>
      <rect x="100" y="18" width="50" height="24" rx="6" fill="#46d1c4" opacity="0.7"/>
      <rect x="184" y="44" width="50" height="24" rx="6" fill="#9d7bff" opacity="0.7"/>
      <path d="M66 30 H100 M150 30 C 175 30, 175 56, 184 56" stroke="#aab6d8" stroke-width="2.5" fill="none"/>
    </g>
    <text x="28" y="206" font-family="-apple-system,'PingFang SC',sans-serif" font-size="13" fill="#9aa7c8">📊 token · ⏱ 时长 · 🌿 分支 · 🤖 模型</text>
  </g>

  <!-- 右上角主题/功能小标签 -->
  <g font-family="-apple-system,'PingFang SC',sans-serif" font-size="13" fill="#cdd6ee">
    <g transform="translate(890 80)"><rect width="100" height="32" rx="16" fill="#ffffff" opacity="0.08"/><text x="50" y="21" text-anchor="middle">LaTeX 公式</text></g>
    <g transform="translate(1000 80)"><rect width="100" height="32" rx="16" fill="#ffffff" opacity="0.08"/><text x="50" y="21" text-anchor="middle">mermaid 图</text></g>
    <g transform="translate(890 124)"><rect width="100" height="32" rx="16" fill="#ffffff" opacity="0.08"/><text x="50" y="21" text-anchor="middle">六套主题</text></g>
    <g transform="translate(1000 124)"><rect width="100" height="32" rx="16" fill="#ffffff" opacity="0.08"/><text x="50" y="21" text-anchor="middle">离线可用</text></g>
    <g transform="translate(890 168)"><rect width="210" height="32" rx="16" fill="#ffffff" opacity="0.08"/><text x="105" y="21" text-anchor="middle">token / 轮数自动统计</text></g>
    <g transform="translate(890 212)"><rect width="210" height="32" rx="16" fill="#ffffff" opacity="0.08"/><text x="105" y="21" text-anchor="middle">跨午夜接续 · 会话别名</text></g>
  </g>
</svg>
