<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 工作日志 · 时间线</title>
<script>
  // 尽早写入主题属性，避免首屏闪烁（FOUC）
  try {
    document.documentElement.setAttribute("data-style", localStorage.getItem("ai-log:style") || "glass");
    document.documentElement.setAttribute("data-mode", localStorage.getItem("ai-log:mode") || "light");
  } catch (e) {
    document.documentElement.setAttribute("data-style", "glass");
    document.documentElement.setAttribute("data-mode", "light");
  }
</script>
